[pytest]
# Pytest configuration for Adhan SLM
testpaths = tests src/adhan_slm
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Display options
addopts = --strict-markers -v --tb=short --disable-warnings

# Coverage options (used with pytest-cov)
# Run with: pytest --cov=src/adhan_slm --cov-report=html

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may need resources)
    slow: Slow tests (skip with -m "not slow")
    jax: Tests requiring JAX
    pytorch: Tests requiring PyTorch
    e2e: End-to-end tests
