version: '3.8'

services:
  adhan-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adhan-slm-api
    ports:
      - "8000:8000"
    environment:
      - ADHAN_LOG_LEVEL=INFO
      - ADHAN_JSON_LOGS=false
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: python scripts/run_api_server.py --host 0.0.0.0 --port 8000 --log-level INFO

volumes:
  data:
  checkpoints:
