name: Type Checking

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy numpy pyyaml

      - name: Run mypy type checker
        run: |
          mypy src/adhan_slm --ignore-missing-imports --no-error-summary 2>&1 | head -100 || true
        continue-on-error: true
