# Adhan SLM — training config (default: tiny tier, ~33M params)
# Used by: python -m adhan_slm.training.train_jax --config <this>

experiment: adhan-slm
run_name: null            # null -> MLflow autogenerates
mlflow_uri: null          # e.g. "http://localhost:5000" or "file:./mlruns"
checkpoint_dir: checkpoints/adhan-tiny   # Orbax dir (resumable, best-by-val); null to disable

model:
  size: tiny              # nano | tiny | mini  (or omit and set fields explicitly)
  vocab_size: 12000       # frozen swaram tokenizer vocab (roadmap Phase 1)
  use_boundary_emb: false # enable to add tokenizer Layer-C morpheme-boundary signal
  dtype: bfloat16

train:
  batch_size: 32
  learning_rate: 3.0e-4
  warmup_steps: 2000
  max_steps: 100000
  weight_decay: 0.1
  seed: 0
  log_every: 10           # steps between host-synced metric flushes
  eval_every: 2000        # steps between validation-perplexity passes (uses val.bin)
  checkpoint_every: 2000  # steps between Orbax checkpoints
  keep_checkpoints: 3     # most-recent + best retained

data:
  version: adhan-corpus-v1        # dataset version tag logged to MLflow
  # Packed swaram-tokenized shards from scripts/prepare_slm_corpus.py.
  # That dir holds train.bin / val.bin (+ manifests), vocab.json, merges.txt, datasheet.json.
  shards: data/final/tamil_slm/
  seq_packing: true

# Launch-first tier: to pretrain the shippable nano model, set model.size: nano.
